# Font configuration
#
# Installed font files include JetBrainsMonoNerdFontMono-*.ttf.
# If kitty ever complains about the family name, run:
#   kitten choose-fonts

font_family      JetBrainsMono Nerd Font Mono
bold_font        auto
italic_font      auto
bold_italic_font auto

font_size 13.0
disable_ligatures never

# Slightly taller cells keep Nerd Font icons and prompt glyphs comfortable.
modify_font cell_height 105%

