# Animated cursor
#
# Kitty 0.37+ supports cursor trails. The value is the minimum time, in
# milliseconds, the cursor must stay still before a later jump gets animated.
# Lower values show the effect more often; higher values keep busy TUI apps
# calmer.

cursor_shape beam
cursor_shape_unfocused hollow

# Smooth blink animation. Set to 0 to disable blinking entirely.
cursor_blink_interval 0.5 ease-in-out
cursor_stop_blinking_after 15.0

# Cursor trail animation.
cursor_trail 3
# cursor_trail_decay 0.08 0.28
# cursor_trail_start_threshold 2

# Use the active theme cursor color. Override with a color if you want, e.g.
# cursor_trail_color #7aa2f7
# cursor_trail_color #e21111
