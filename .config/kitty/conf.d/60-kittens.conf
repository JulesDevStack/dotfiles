# Kittens and plugin-like extensions
#
# Kitty does not use plugins like Oh My Zsh. Its extension points are:
# - built-in kittens, launched with `kitten ...`
# - custom kittens/scripts, usually placed in ./plugins
# - keymaps/action aliases that call those kittens
#
# Suggested layout for custom additions:
#   ~/.config/kitty/plugins/<name>/
#   ~/.config/kitty/plugins/<name>/<script>.py

kitten_alias hints hints
kitten_alias themes themes
kitten_alias unicode unicode_input

# Useful built-in kittens.
map kitty_mod+f kitten hints
map kitty_mod+u kitten unicode_input
map kitty_mod+e kitten themes
map kitty_mod+h show_scrollback

# Remote control is useful for future scripts/plugins.
# It is restricted to this Kitty instance unless you explicitly expose a socket.
allow_remote_control yes

